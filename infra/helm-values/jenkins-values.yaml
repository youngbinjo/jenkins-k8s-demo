controller:
  # [유지] 공식 업데이트 센터 사용
  updateCenter: "https://updates.jenkins.io/update-center.json"
  
  # [유지] Job DSL 자동 실행 설정
  JCasC:
    defaultConfig: false
    security:
      shouldBeEnable: false 

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - job-dsl

  # [수정] CASC_JENKINS_CONFIG 경로를 커스텀 경로로 변경
  containerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-pw
          key: password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token
          key: GITHUB_TOKEN
    - name: CASC_JENKINS_CONFIG
      # 헬름 기본 경로와 겹치지 않게 파일명까지 명시합니다.
      value: "/var/jenkins_home/custom_configs/jenkins.yaml"

  # [수정] 볼륨 이름 및 마운트 경로 변경
  additionalVolumes:
    - name: jenkins-custom-casc
      configMap:
        name: jenkins-casc

  additionalVolumeMounts:
    - name: jenkins-custom-casc
      # 마운트 경로를 custom_configs로 변경하여 헬름 기본 파일들과 격리합니다.
      mountPath: /var/jenkins_home/custom_configs
      readOnly: true

  javaOpts: "-Xmx1024m -Duser.timezone=Asia/Seoul"
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

persistence:
  enabled: false
