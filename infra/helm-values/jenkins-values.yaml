controller:
  updateCenter: "https://updates.jenkins.io/update-center.json"
  
  JCasC:
    defaultConfig: false  # 기본 보안 설정을 꺼서 사용자 설정과 충돌 방지
    security:
      shouldBeEnable: false 

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - job-dsl

  containerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-pw
          key: password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token
          key: GITHUB_TOKEN

  # [핵심] 추가적인 CASC_JENKINS_CONFIG 정의나 볼륨 마운트를 여기서 하지 않습니다.
  # 모든 것은 Helm 차트의 사이드카 기능과 user_data.sh의 --set 옵션에 맡깁니다.
  additionalVolumes: []
  additionalVolumeMounts: []

  javaOpts: "-Xmx1024m -Duser.timezone=Asia/Seoul"
