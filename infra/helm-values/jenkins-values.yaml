controller:
  # [유지] 공식 업데이트 센터 사용
  updateCenter: "https://updates.jenkins.io/update-center.json"
  
  # [유지] Job DSL 자동 실행 설정
  JCasC:
    defaultConfig: false
    security:
      shouldBeEnable: false 

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - job-dsl

  # [수정] 충돌을 방지하기 위해 CASC_JENKINS_CONFIG 환경 변수 중복 정의 제거
  containerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-pw
          key: password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token
          key: GITHUB_TOKEN

  # [수정] 수동 볼륨 마운트 제거 (Sidecar가 자동으로 처리함)
  additionalVolumes: []
  additionalVolumeMounts: []

  javaOpts: "-Xmx1024m -Duser.timezone=Asia/Seoul"
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

persistence:
  enabled: false
