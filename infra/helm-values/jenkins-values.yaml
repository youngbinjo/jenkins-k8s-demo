controller:
  updateCenter: "https://updates.jenkins.io/update-center.json"
  
  # JCasC 설정: 기본 설정을 끄고 사이드카를 통한 커스텀 파일만 읽도록 유도
  JCasC:
    defaultConfig: false
    security:
      shouldBeEnable: false 
    configScripts: {}

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - job-dsl

  containerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-admin-pw
          key: password
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token
          key: GITHUB_TOKEN
    - name: CASC_JENKINS_CONFIG
      value: "/var/jenkins_home/casc_configs/jenkins.yaml"

  # 사이드카 설정 내역을 values에 포함시켜 --set과의 충돌을 방지합니다.
  sidecars:
    configAutoReload:
      enabled: true
      label: jenkins-jenkins-config
      folder: /var/jenkins_home/casc_configs

  javaOpts: "-Xmx1024m -Duser.timezone=Asia/Seoul"
  
  # [중요] 이전에 충돌을 일으켰던 additionalVolumeMounts는 반드시 비워둡니다.
  additionalVolumes: []
  additionalVolumeMounts: []
