jenkins:
  systemMessage: "Jenkins configured automatically via JCasC (GitOps-style)"
  numExecutors: 0

  # 1. 관리자 계정 정의 (Terraform/Secret에서 주입된 비밀번호 사용)
  securityRealm:
    local:
      allowsSignup: false
      users:
       - id: "admin"
         # jenkins-values.yaml에서 매핑한 환경변수명을 정확히 기입합니다.
         password: "${JENKINS_ADMIN_PASSWORD}"

  # 2. 권한 전략 설정 (로그인한 사용자에게 모든 권한 부여)
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    # 사용자님의 도메인으로 설정하여 일관성을 유지합니다.
    url: "http://jenkins.ybtest.pics/"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "youngbinjo"
              password: "${GITHUB_TOKEN}"
              description: "GitHub PAT for repo access"

jobs:
  - script: >
      pipelineJob('k8s-deploy-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/youngbinjo/jenkins-k8s-demo.git')
                  credentials('github-pat')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
